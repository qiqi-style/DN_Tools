# cli-proxy cpa反代
services:
  cli-proxy:
    image: eceasy/cli-proxy-api:latest
    container_name: cli-proxy
    restart: always
    ports:
      # 端口映射格式为 "宿主机IP:宿主机端口:容器端口"
      # 注意：127.0.0.1 意味着仅允许宿主机本地访问
      - "127.0.0.1:8317:8317"
      - "127.0.0.1:8085:8085"
      - "127.0.0.1:1455:1455"
      - "127.0.0.1:54545:54545"
      - "127.0.0.1:51121:51121"
      - "127.0.0.1:11451:11451"
    volumes:
      # 配置文件挂载
      - ./config.yaml:/CLIProxyAPI/config.yaml
      # 认证信息目录挂载
      - ./auth-dir:/root/.cli-proxy-api
      # 日志目录挂载
      - ./logs:/CLIProxyAPI/logs