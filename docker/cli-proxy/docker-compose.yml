services:
  cli-proxy:
    image: eceasy/cli-proxy-api:latest
    container_name: dn-tools-cli-proxy
    restart: unless-stopped
    ports:
      - "${CLI_PROXY_BIND_HOST:-127.0.0.1}:${CLI_PROXY_API_PORT:-8317}:8317"
      - "${CLI_PROXY_BIND_HOST:-127.0.0.1}:${CLI_PROXY_PANEL_PORT:-8085}:8085"
      - "${CLI_PROXY_BIND_HOST:-127.0.0.1}:${CLI_PROXY_AUX_PORT_1:-1455}:1455"
      - "${CLI_PROXY_BIND_HOST:-127.0.0.1}:${CLI_PROXY_AUX_PORT_2:-54545}:54545"
      - "${CLI_PROXY_BIND_HOST:-127.0.0.1}:${CLI_PROXY_AUX_PORT_3:-51121}:51121"
      - "${CLI_PROXY_BIND_HOST:-127.0.0.1}:${CLI_PROXY_AUX_PORT_4:-11451}:11451"
    volumes:
      - ./config.yaml:/CLIProxyAPI/config.yaml:ro
      - ./auth-dir:/root/.cli-proxy-api
      - ./logs:/CLIProxyAPI/logs
