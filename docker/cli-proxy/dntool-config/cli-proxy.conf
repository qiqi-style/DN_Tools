# cli-proxy Nginx 反向代理模板
server {
    # HTTPS 监听端口；ssl 表示启用 TLS
    listen 443 ssl;
    # HTTP/3 QUIC 监听端口；需要 Nginx 支持 quic
    listen 443 quic;
    # 绑定访问域名
    server_name you.example.com;

    # SSL 证书文件路径
    ssl_certificate      /root/youssl/cert.crt;
    # SSL 私钥文件路径
    ssl_certificate_key  /root/youssl/private.key;

    # === 全局通用优化设置（下面所有的 location 都会自动继承） ===

    # 1. 客户端上传大小限制，多模态传图和文件上传需要
    client_max_body_size 50m;

    # 2. 声明 HTTP/3 QUIC 支持
    add_header Alt-Svc 'h3=":443"; ma=86400';
    # 3. 让浏览器把页面中的 HTTP 资源自动升级为 HTTPS
    add_header Content-Security-Policy "upgrade-insecure-requests";

    # 4. 使用 HTTP/1.1，兼容 WebSocket 和流式响应
    proxy_http_version 1.1;
    # 保留原始访问域名
    proxy_set_header Host $host;
    # 传递客户端真实 IP
    proxy_set_header X-Real-IP $remote_addr;
    # 传递完整代理链路 IP
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    # 传递原始访问协议
    proxy_set_header X-Forwarded-Proto $scheme;

    # 5. 支持 WebSocket 升级
    proxy_set_header Upgrade $http_upgrade;
    # 保持 WebSocket 连接升级标记
    proxy_set_header Connection "upgrade";

    # 6. 超长超时时间，防止大模型长时间思考导致 504
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;
    proxy_connect_timeout 60s;

    # 7. 关闭缓冲，确保打字机流式输出及时返回
    proxy_buffering off;


    # === 核心路由区 ===

    # 0. 根目录精确匹配，自动跳转到管理页面
    location = / {
        return 301 https://$host/management.html;
    }

    # 1. 主 API 接口 (8317)
    location / {
        proxy_pass http://127.0.0.1:8317;
    }

    # 2. Gemini OAuth & 管理 (8085)
    location /v1/gemini/ {
        proxy_pass http://127.0.0.1:8085/;
    }

    # 3. OpenAI / Codex OAuth (1455)
    location /v1/openai/ {
        proxy_pass http://127.0.0.1:1455/;
    }

    # 4. Claude OAuth (54545)
    location /v1/claude/ {
        proxy_pass http://127.0.0.1:54545/;
    }

    # 5. iFlow OAuth (11451)
    location /v1/iflow/ {
        proxy_pass http://127.0.0.1:11451/;
    }

    # 6. Antigravity OAuth (51121)
    location /v1/antigravity/ {
        proxy_pass http://127.0.0.1:51121/;
    }
}
