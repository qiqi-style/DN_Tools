# cli-proxy Nginx 反向代理模板
server {
    # 域名与 HTTPS/HTTP3 证书配置
    listen 443 ssl;
    listen 443 quic;
    server_name you.example.com;
    ssl_certificate      /root/youssl/cert.crt;
    ssl_certificate_key  /root/youssl/private.key;

    # 上传限制、HTTP3 和基础安全策略
    client_max_body_size 50m;
    add_header Alt-Svc 'h3=":443"; ma=86400';
    add_header Content-Security-Policy "upgrade-insecure-requests";

    # 所有 location 继承这些代理头，兼容 WebSocket 和流式输出
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    # 大模型长回复和流式输出：放宽超时并关闭缓冲
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;
    proxy_connect_timeout 60s;
    proxy_buffering off;


    # === 核心路由区 ===

    # 根目录跳转到管理页面
    location = / {
        return 301 https://$host/management.html;
    }

    # 主 API 接口
    location / {
        proxy_pass http://127.0.0.1:8317;
    }

    # Gemini OAuth 与管理接口
    location /v1/gemini/ {
        proxy_pass http://127.0.0.1:8085/;
    }

    # OpenAI / Codex OAuth
    location /v1/openai/ {
        proxy_pass http://127.0.0.1:1455/;
    }

    # Claude OAuth
    location /v1/claude/ {
        proxy_pass http://127.0.0.1:54545/;
    }

    # iFlow OAuth
    location /v1/iflow/ {
        proxy_pass http://127.0.0.1:11451/;
    }

    # Antigravity OAuth
    location /v1/antigravity/ {
        proxy_pass http://127.0.0.1:51121/;
    }
}
