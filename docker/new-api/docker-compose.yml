services:
  new-api:
    image: calciumion/new-api:latest
    container_name: dn-tools-new-api
    restart: unless-stopped
    command: --log-dir /app/logs
    ports:
      - "${NEW_API_BIND_HOST:-127.0.0.1}:${NEW_API_PORT:-3000}:3000"
    volumes:
      - ./data:/data
      - ./logs:/app/logs
    environment:
      SQL_DSN: "postgresql://${NEW_API_POSTGRES_USER:-dn_tools_new_api}:${NEW_API_POSTGRES_PASSWORD:-DN_TOOLS_CHANGE_ME_POSTGRES_PASSWORD}@postgres:5432/${NEW_API_POSTGRES_DB:-new_api}"
      REDIS_CONN_STRING: "redis://:${NEW_API_REDIS_PASSWORD:-DN_TOOLS_CHANGE_ME_REDIS_PASSWORD}@redis:6379"
      TZ: "${TZ:-Asia/Shanghai}"
      ERROR_LOG_ENABLED: "true"
      BATCH_UPDATE_ENABLED: "true"
      NODE_NAME: "${NEW_API_NODE_NAME:-dn-tools-new-api-1}"
    depends_on:
      - redis
      - postgres
    networks:
      - dn-tools-new-api-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:3000/api/status | grep -q '\"success\"' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:latest
    container_name: dn-tools-new-api-redis
    restart: unless-stopped
    command: ["sh", "-c", "redis-server --requirepass \"$${REDIS_PASSWORD}\""]
    environment:
      REDIS_PASSWORD: "${NEW_API_REDIS_PASSWORD:-DN_TOOLS_CHANGE_ME_REDIS_PASSWORD}"
    networks:
      - dn-tools-new-api-network

  postgres:
    image: postgres:15
    container_name: dn-tools-new-api-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: "${NEW_API_POSTGRES_USER:-dn_tools_new_api}"
      POSTGRES_PASSWORD: "${NEW_API_POSTGRES_PASSWORD:-DN_TOOLS_CHANGE_ME_POSTGRES_PASSWORD}"
      POSTGRES_DB: "${NEW_API_POSTGRES_DB:-new_api}"
    volumes:
      - dn-tools-new-api-pg-data:/var/lib/postgresql/data
    networks:
      - dn-tools-new-api-network

volumes:
  dn-tools-new-api-pg-data:

networks:
  dn-tools-new-api-network:
    driver: bridge
