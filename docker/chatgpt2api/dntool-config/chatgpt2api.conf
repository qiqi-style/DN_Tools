# chatgpt2api Nginx 反向代理模板
server {
    # 域名与 HTTPS/HTTP3 证书配置
    listen 443 ssl;
    listen 443 quic;
    server_name you.example.com;
    ssl_certificate      /root/youssl/cert.crt;
    ssl_certificate_key  /root/youssl/private.key;

    # 上传与 HTTP3 能力
    client_max_body_size 50m;
    add_header Alt-Svc 'h3=":443"; ma=86400';

    # 转发到 chatgpt2api 服务，保留真实来源并支持 WebSocket
    location / {
        proxy_pass http://127.0.0.1:13080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # AI 画图和流式输出：放宽超时并关闭缓冲
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 60s;
        proxy_buffering off;
    }
}
