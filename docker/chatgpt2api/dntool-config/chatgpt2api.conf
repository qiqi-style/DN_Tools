# chatgpt2api Nginx 反向代理模板
server {
    # HTTPS 监听端口；ssl 表示启用 TLS
    listen 443 ssl;
    # HTTP/3 QUIC 监听端口；需要 Nginx 支持 quic
    listen 443 quic;
    # 绑定访问域名
    server_name you.example.com;

    # SSL 证书文件路径
    ssl_certificate      /root/youssl/cert.crt;
    # SSL 私钥文件路径
    ssl_certificate_key  /root/youssl/private.key;

    # 1. 客户端上传大小限制，图片和文件上传需要
    client_max_body_size 50m;

    # 2. 告诉浏览器支持 HTTP/3 QUIC，配合 listen 443 quic 使用
    add_header Alt-Svc 'h3=":443"; ma=86400';

    # 默认代理所有路径到 chatgpt2api 服务
    location / {
        # Docker 服务的本机访问地址
        proxy_pass http://127.0.0.1:13080;

        # 使用 HTTP/1.1，兼容 WebSocket 和流式响应
        proxy_http_version 1.1;
        # 保留原始访问域名
        proxy_set_header Host $host;
        # 传递客户端真实 IP
        proxy_set_header X-Real-IP $remote_addr;
        # 传递完整代理链路 IP
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # 传递原始访问协议
        proxy_set_header X-Forwarded-Proto $scheme;

        # 3. 支持 WebSocket，很多 AI 前端 UI 会用它同步状态
        proxy_set_header Upgrade $http_upgrade;
        # 保持 WebSocket 连接升级标记
        proxy_set_header Connection "upgrade";

        # 4. 后端读取超时时间，AI 画图可能超过 Nginx 默认 60 秒
        proxy_read_timeout 300s;
        # 5. 后端发送超时时间，AI 画图可能超过 Nginx 默认 60 秒
        proxy_send_timeout 300s;
        # 6. 后端连接超时时间
        proxy_connect_timeout 60s;

        # 7. 关闭缓冲，有助于流式数据更快显示
        proxy_buffering off;
    }
}
